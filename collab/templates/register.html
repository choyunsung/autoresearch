{% extends "base.html" %}
{% block title %}Register — AutoResearch Collab{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 3rem auto;">
  <div class="card">
    <h2 style="margin-bottom: 1.5rem;">Join Research</h2>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/register">
      <div class="grid-equal">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
          <label for="display_name">Display Name</label>
          <input type="text" id="display_name" name="display_name" required>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="6">
      </div>
      <div class="form-group">
        <label for="institution">Institution (optional)</label>
        <input type="text" id="institution" name="institution" placeholder="e.g. Seoul National University">
      </div>
      <div class="form-group">
        <label for="gpu_info">GPU Info (optional)</label>
        <input type="text" id="gpu_info" name="gpu_info" placeholder="e.g. H100 80GB">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
    </form>
    <p style="margin-top: 1rem; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
      Already have an account? <a href="/login">Login</a>
    </p>
  </div>
</div>
{% endblock %}
