<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AutoResearch Collab{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">AutoResearch Collab</a>
    <ul class="navbar-nav">
      <li><a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>대시보드</a></li>
      <li><a href="/experiments" {% if "/experiments" in request.url.path and "/fork" not in request.url.path %}class="active"{% endif %}>실험</a></li>
      <li><a href="/forks" {% if "/forks" in request.url.path or "/merge" in request.url.path %}class="active"{% endif %}>포크</a></li>
      <li><a href="/threads" {% if "/threads" in request.url.path %}class="active"{% endif %}>토론</a></li>
      <li><a href="/leaderboard" {% if "/leaderboard" in request.url.path %}class="active"{% endif %}>순위</a></li>
      <li><a href="/saleae" {% if "/saleae" in request.url.path %}class="active"{% endif %}>신호</a></li>
      <li><a href="/research-config" {% if "/research-config" in request.url.path %}class="active"{% endif %}>설정</a></li>
    </ul>
    <div class="navbar-user">
      {% if user %}
        <a href="/researchers/{{ user.id }}" style="color: var(--text-secondary); font-weight: 500;">{{ user.display_name }}</a>
        <a href="/profile/edit" class="btn btn-sm">프로필</a>
        <a href="/logout" class="btn btn-sm">로그아웃</a>
      {% else %}
        <a href="/login" class="btn btn-sm">로그인</a>
        <a href="/register" class="btn btn-sm btn-primary">가입</a>
      {% endif %}
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
