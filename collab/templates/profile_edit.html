{% extends "base.html" %}
{% block title %}Edit Profile — AutoResearch Collab{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 2rem auto;">
  <div class="card">
    <h2 style="margin-bottom: 1.5rem;">Edit Profile</h2>
    <form method="post" action="/profile/edit">
      <div class="form-group">
        <label>Display Name</label>
        <input type="text" name="display_name" value="{{ user.display_name }}" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ user.email }}" required>
      </div>
      <div class="form-group">
        <label>Institution</label>
        <input type="text" name="institution" value="{{ user.institution or '' }}">
      </div>
      <div class="form-group">
        <label>Bio</label>
        <textarea name="bio" placeholder="Tell other researchers about yourself...">{{ user.bio or '' }}</textarea>
      </div>
      <div class="form-group">
        <label>GPU Info</label>
        <input type="text" name="gpu_info" value="{{ user.gpu_info or '' }}" placeholder="e.g. H100 80GB">
      </div>
      <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/researchers/{{ user.id }}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
